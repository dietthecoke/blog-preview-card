<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  <link rel="stylesheet" href="./stylesheet/style.css">
  <title>Frontend Mentor | Blog preview card</title>
</head>
<body>
  <main>
    <div class="card">
      <img class="card-img" src="./assets/images/illustration-article.svg" alt="Illustration of an article">
      <div class="card-content">  
        <span class="card-category">Learning</span>
        <p class="card-date">Published 21 Dec 2023</p>
        <h1><a href="#">HTML & CSS foundations</a></h1>
        <p class="card-description">These languages are the backbone of every website, defining structure, content, and presentation.</p>
      </div>
      <div class="card-author">
        <img src="./assets/images/image-avatar.webp" alt="Avatar of Greg Hooper">
        <span>Greg Hooper</span>
      </div>
    </div>
  </main> 
  <footer class="attribution">
    <p>Challenge by <a href="https://www.frontendmentor.io?ref=challenge" target="_blank">Frontend Mentor</a>. 
    Coded by <a href="https://github.com/dietthecoke">Diet Salazar</a>.</p>
  </footer>
</body>
</html>
